directories:
  root:
    purpose: Primary entry point for collaborators and citation metadata.
    key_files:
      - README.md
      - CONTRIBUTING.md
      - CONTRIBUTORS.md
      - LICENSE
      - LICENSE-DOCS.md
      - CITATION.cff
      - pyproject.toml
      - Makefile
      - requirements.txt
      - .env.example
    notes: >
      Root metadata must stay at the repository root for DOI integration,
      contribution policy, and licensing clarity. Python package is MIT;
      markdown docs and KG content are CC BY-NC 4.0 (LICENSE-DOCS.md).

  src/agentloom:
    purpose: Runnable v3 framework (installable Python package).
    key_files:
      - src/agentloom/__init__.py
      - src/agentloom/kg/validate_all.py
      - src/agentloom/kg/propose_node.py
      - src/agentloom/kg/accept_proposal.py
      - src/agentloom/validators/run_all.py
      - src/agentloom/sync_clinerules.py
      - src/agentloom/dashboard/app.py
    notes: >
      Install with `pip install -e .[dev]`. Governance gate: `make validate-all`
      or `make test`. Dashboard: `make dashboard`.

  agents:
    purpose: Governed knowledge graphs, skills, and behaviors (data the framework enforces).
    key_files:
      - agents/knowledge-graphs/master-graph.json
      - agents/knowledge-graphs/builder-behaviors-graph.json
      - agents/knowledge-graphs/builder-knowledge-graph.json
      - agents/knowledge-graphs/builder-skills-graph.json
      - agents/knowledge-graphs/README.md
      - agents/knowledge-graphs/MAINTENANCE.md
      - agents/skills/builder/skill-validate-kg.md
      - agents/skills/builder/skill-propose-node.md
      - agents/skills/builder/skill-wire-validator.md
    notes: >
      KG JSON files are canonical; edits go through propose-review-accept
      (see docs/builder/protocols/propose-review-protocol.md).

  docs:
    purpose: Framework documentation — guides, builder concepts, release notes.
    key_files:
      - docs/guides/START_HERE.md
      - docs/guides/getting-started.md
      - docs/guides/agentic-collaboration-guide.md
      - docs/guides/cursor-quickstart-for-contributors.md
      - docs/guides/co-agenticOS-integration-guide.md
      - docs/builder/concepts/builder-agent-system-prompt.md
      - docs/builder/protocols/propose-review-protocol.md
      - docs/builder/governance/governance-tiers.md
      - docs/case-studies/README.md
      - docs/releases/README.md
      - docs/DISCUSSION_TEMPLATE.md
    notes: >
      Research positioning docs removed from flagship (live in private dev repo).
      Builder docs under docs/builder/ are the authoritative v3 governance narrative.

  archive:
    purpose: Historical protocol packages and earlier framework prototypes (reference only).
    key_files:
      - archive/README.md
      - archive/protocol/agentLoom-v3/README.md
      - archive/protocol/agentLoom-v3/AGENTLOOM_DESIGN.md
      - archive/protocol/agentLoom-v3/USER_MANUAL_NEW_PROJECT.md
    notes: >
      Nothing here is part of the runnable framework. Superseded by src/agentloom/.
      Retained for design-lineage provenance.

  examples:
    purpose: Runnable examples (placeholder until v4.0).
    key_files:
      - examples/README.md
    notes: Examples will land in v4.0 alongside MCP server integration.

  tests:
    purpose: Pytest suite wrapping the governance gate.
    key_files:
      - tests/test_validators.py
    notes: Runs KG validators + Tier-A behavior validators via `make test`.

  clinerules:
    purpose: Generated Cline host configuration (synced from builder KG).
    key_files:
      - .clinerules/00-README.md
      - .clinerules/01-builder-agent-prompt.md
      - .clinerules/02-cline-host-adaptation.md
      - .clinerules/03-workshop-discipline.md
    notes: >
      Do not hand-edit 01-builder-agent-prompt.md; regenerate with
      `make sync-clinerules`.

  cursor:
    purpose: AI assistant configuration and collaboration policies.
    key_files:
      - .cursor/rules.md
    notes: Update after structural changes so automation follows current guidelines.

  github:
    purpose: GitHub configuration templates and workflows.
    key_files:
      - .github/PULL_REQUEST_TEMPLATE.md
    notes: PR template ensures submissions follow project standards.

metadata:
  maintainers:
    - name: Dr. Boyuan (Keven) Guan
      affiliation: FIU Library & GIS Center
      contact: bguan@fiu.edu
  citation:
    doi: 10.5281/zenodo.17561541
    file: CITATION.cff
    notes: Update after new Zenodo releases.
